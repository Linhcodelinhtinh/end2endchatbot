<script type="text/javascript">
  $(function() {
    let loginStatus = 'nah'
    if (loginStatus === 'failed') $("#signInControl_FailureText_Fail").show();
    if (loginStatus === 'denied') $("#signInControl_FailureText_Deny").show();
    if (loginStatus === 'permit') {
      setTimeout(function() {
        alert('Tài khoản của bạn chưa được khai báo trên hệ thống VNU-Office. Vui lòng liên hệ quản trị để được cấp tài khoản!!!');
      }, 100)
    }
  });

  function loginVNU() {
    window.location = "sso"
  }

  function _rs() {
    var margin = ($(document).height() - $("#Login").height()) / 2 - 25;
    $("#Login").css('margin-top', margin + 'px');
  }

  $("#signInControl_UserName").focus();
  _rs();

  function login() {
    /* for remember */
    setCookie("puppy", $("#Remember").is(':checked'), 365);
    if ($("#Remember").is(':checked')) {
      setCookie("myuser", $("#signInControl_UserName").val(), 365);
      setCookie("mypass", $("#signInControl_password").val(), 365);
    }
    /* do Submit */
    $("#Form").submit()
  }

  $("#signInControl_UserName")
    .off('keyup')
    .on('keyup', function(e) {
      var code = e.keyCode || e.which;
      if (code == 13) {
        $("#signInControl_password").focus();
      }
    });
  $("#Password")
    .off('keyup')
    .on('keyup', function(e) {
      var code = e.keyCode || e.which;
      if (code == 13) {
        login();
      }
    });

  if (getCookie("puppy") == "true") {
    $("#Remember").attr('checked', true);
    $("#Username").val(getCookie("myuser"));
    $("#Password").val(getCookie("mypass"));
  } else {
    $("#Username").val("");
    $("#Password").val("");
  }

  /* check localStorage */
  if (typeof(Storage) !== "undefined") {
    if (localStorage.getItem('MachineID') == null) {
      $("#MachineID").val("");
    } else {
      $("#MachineID").val(localStorage.getItem('MachineID'));
    }
  } else {
    $("#MachineID").val("");
  }
</script>
